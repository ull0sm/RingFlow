                    "secondary-fixed-dim": "#b4c5ff",
                    "on-tertiary-fixed-variant": "#574425",
                    "secondary": "#0051d5",
                    "tertiary": "#000000",
                    "surface-container-highest": "#e0e3e5",
                    "inverse-primary": "#bec6e0",
                    "surface-container-high": "#e6e8ea",
                    "secondary-fixed": "#dbe1ff",
                    "primary-fixed-dim": "#bec6e0",
                    "on-primary-container": "#7c839b",
                    "surface-dim": "#d8dadc",
                    "on-tertiary-fixed": "#271901",
                    "surface-container-low": "#f2f4f6",
                    "surface-container": "#eceef0",

                    "inverse-on-surface": "#eff1f3",
                    "surface-variant": "#e0e3e5",
                    "on-tertiary": "#ffffff",

                    "tertiary-fixed": "#fcdeb5",
                    "on-surface": "#191c1e",
                    "primary": "#000000",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#271901",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#003ea8",
                    "inverse-surface": "#2d3133",
                    "outline-variant": "#c6c6cd",
                    "surface-tint": "#565e74",
                    "on-background": "#191c1e",
                    "on-secondary-container": "#fefcff",
                    "on-secondary-fixed": "#00174b",
                    "primary-fixed": "#dae2fd",

                    "on-tertiary-container": "#98805d"
            },
            "borderRadius": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .access-code-input:focus {
            outline: 2px solid #316bf3;
            border-color: transparent;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #E2E8F0;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md">
<!-- Top Navigation (Shell suppressed for focused login journey per instructions) -->
<header class="w-full px-margin-mobile md:px-margin-desktop py-6 flex items-center z-10 justify-center">
<div class="flex items-center gap-2">
<span class="text-headline-sm font-headline-sm font-extrabold text-primary tracking-tighter">Ring Flow</span>
<div class="h-1.5 w-1.5 rounded-full bg-secondary-container"></div>
<span class="text-label-caps font-label-caps text-on-surface-variant uppercase">Moderator login</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile relative">
<!-- Subtle Atmospheric Background Detail -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] opacity-10 blur-[120px] rounded-full bg-secondary-container"></div>
<div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] opacity-5 blur-[100px] rounded-full bg-primary-container"></div>
</div>
<div class="w-full max-w-md z-10">
<!-- Login Card -->
<div class="glass-panel rounded-xl shadow-lg flex flex-col items-center px-4 py-8">
<!-- Security Icon -->
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-on-secondary text-3xl" data-icon="lock" style="font-variation-settings: &quot;FILL&quot; 1;">lock</span>
</div>
<!-- Messaging -->
<div class="text-center mb-10">
<h1 class="text-headline-lg font-headline-lg text-primary mb-2">Access Portal</h1>
<p class="text-body-md text-on-surface-variant">Enter your Ring Access Code to begin</p>
</div>
<!-- Access Code Form -->
<form class="w-full space-y-8" id="access-form" onsubmit="return false;">
<div class="space-y-4">
<div class="relative group">
<input autocomplete="off" class="w-full bg-surface-container-lowest border border-outline-variant text-center font-data-mono tracking-[0.5em] px-4 rounded-lg access-code-input transition-all uppercase placeholder:opacity-20 text-headline-lg py-5" id="access-code" maxlength="8" placeholder="••••••••" type="text">
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-secondary-container transition-all duration-700" id="progress-bar"></div>
</div>
</div>
<div class="space-y-4 pt-4">
<button class="w-full bg-primary-container text-on-secondary font-headline-sm py-5 rounded-lg hover:bg-black transition-all flex items-center justify-center gap-2 group" type="submit">
                            Verify Access
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Meta Links -->
</div>
</main>
<!-- Footer Identity -->
<!-- Micro-interactions Script -->
<script>
        const input = document.getElementById('access-code');
        const counter = document.getElementById('char-count');
        const progressBar = document.getElementById('progress-bar');

        input.addEventListener('input', (e) => {
            const length = e.target.value.length;
            const percentage = (length / 8) * 100;
            
            counter.innerText = `${length} / 8 Characters`;
            progressBar.style.width = `${percentage}%`;

            if (length === 8) {
                counter.classList.remove('text-on-surface-variant');
                counter.classList.add('text-secondary');
            } else {
                counter.classList.add('text-on-surface-variant');
                counter.classList.remove('text-secondary');
            }
        });

        // Focus input on load
        window.onload = () => input.focus();
    </script>
</body></html>
